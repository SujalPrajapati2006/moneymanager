name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'money-manager/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Build & Deploy Spring Boot API to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd money-manager
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/moneymanager
            git pull origin main
            cd money-manager
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            cd ~/moneymanager/money-manager
            sudo docker rm -f backend || true
            sudo docker build -t money-manager-backend .
            sudo docker run -d \
              --name backend \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO="update" \
              -e BREVO_USERNAME="${{ secrets.BREVO_USERNAME }}" \
              -e BREVO_PASSWORD="${{ secrets.BREVO_PASSWORD }}" \
              -e BREVO_FROM_EMAIL="${{ secrets.BREVO_FROM_EMAIL }}" \
              -e MONEY_MANAGER_FRONTEND_URL="*" \
              money-manager-backend
