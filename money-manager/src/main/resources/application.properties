# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/moneymanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

server.servlet.context-path=/api/v1.0
server.port=${PORT:8080}

#JPA Configuration
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

#Email configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL:noreply@example.com}

jwt.secret=2b8e7c7e-4e2a-4b1a-9c2e-8f7e2d3c4b5a

money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL:http://localhost:5173}

app.activation.url=${MONEY_MANAGER_BACKEND_URL:http://localhost:8080}
spring.profiles.active=prod